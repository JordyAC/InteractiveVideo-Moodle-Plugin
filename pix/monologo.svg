<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#2c5aa0"/>
    </linearGradient>
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#ff5500"/>
    </linearGradient>
  </defs>
  <!-- Background Screen -->
  <rect x="2" y="4" width="20" height="16" rx="3" fill="url(#screenGrad)" />
  <!-- Video Play Button Inside Screen -->
  <polygon points="10,8 16,12 10,16" fill="#ffffff" />
  <!-- Interactive Marker Dot in Timeline -->
  <circle cx="18" cy="16" r="2.5" fill="url(#dotGrad)" stroke="#ffffff" stroke-width="1" />
  <!-- Line representing timeline -->
  <line x1="4" y1="18" x2="20" y2="18" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
</svg>
